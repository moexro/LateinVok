<!doctype html>

<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ovid – Spezialwortschatz III</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header>
      <div class="subtitle">Latein · Ovid</div>
      <h1>Spezialwortschatz III</h1>
    </header>

    <div id="app"></div>

    <script>
      const ALL_CARDS = [
        // Vokabeln
        { latin: "eōdem", info: "Adv.", german: "dorthin" },
        {
          latin: "error",
          info: "errōris m",
          german: "1 Irrtum, Zweifel\n2 Irrfahrt, Irrweg",
        },
        {
          latin: "exsistere",
          info: "exsistō, exstitī",
          german: "hervorkommen",
        },
        { latin: "faciēs", info: "faciēī f", german: "Gesicht" },
        { latin: "fārī", info: "for, fātus sum", german: "sagen" },
        { latin: "faucēs", info: "faucium Pl. f", german: "Hals" },
        { latin: "favēre", info: "faveō, fāvī m. Dat.", german: "begünstigen" },
        { latin: "fax", info: "facis f", german: "Fackel" },
        { latin: "fera", info: "", german: "(wildes) Tier" },
        { latin: "fervēre", info: "ferveō", german: "brennen, glühen" },
        { latin: "figere", info: "figō, fīxī, fīxum", german: "befestigen" },
        { latin: "fīnīre", info: "fīniō, fīnīvī, fīnītum", german: "beenden" },
        { latin: "flāvus", info: "a, um", german: "gelb" },
        { latin: "fraus", info: "fraudis f", german: "Betrug" },
        { latin: "frēnum", info: "", german: "Zügel" },
        { latin: "frīgus", info: "frīgoris n", german: "Kälte" },
        { latin: "frōns", info: "frondis f", german: "Laub" },
        { latin: "frons", info: "frontis f", german: "Stirn" },
        { latin: "frūgēs", info: "frūgum Pl. f", german: "Früchte" },
        { latin: "fulmen", info: "fulminis n", german: "Blitz" },
        { latin: "gelidus", info: "a, um", german: "kalt" },
        { latin: "geminus", info: "a, um", german: "doppelt" },
        { latin: "gener", info: "generī m", german: "Schwiegersohn" },
        { latin: "genitor", info: "genitōris m", german: "Vater" },
        { latin: "genū", info: "genūs n", german: "Knie" },
        // Aus Wortgruppe Mord–Blut–Tod (die nicht schon oben vorkamen)
        { latin: "exitium", info: "", german: "Tod, Verderben" },
        { latin: "mors", info: "mortis f", german: "Tod" },
        { latin: "nex", info: "necis f", german: "gewaltsamer Tod" },
        { latin: "cruor", info: "cruōris m", german: "Blut" },
        { latin: "sanguis", info: "sanguinis m", german: "Blut" },
        { latin: "sepulcrum", info: "", german: "Grabmal" },
        { latin: "tumulus", info: "", german: "(Grab-)Hügel" },
        // Wendungen
        {
          latin: "Oscula in os puellae figit",
          info: "Wendung",
          german: "Er drückt Küsse auf den Mund der Freundin.",
        },
        {
          latin: "Stellae sub aethere fixae sunt",
          info: "Wendung",
          german: "Die Sterne haften am Himmel.",
        },
        {
          latin: "Ensis in pectore fixus est",
          info: "Wendung",
          german: "Das Schwert steckt in der Brust.",
        },
        {
          latin: "proles gemina / alae geminae",
          info: "Wendung",
          german: "Zwillingspaar / Flügelpaar, beide Flügel",
        },
        {
          latin: "re-sistere",
          info: "Wendung",
          german: "stehen bleiben, Widerstand leisten",
        },
        {
          latin: "con-sistere",
          info: "Wendung",
          german: "Halt machen, sich aufstellen",
        },
        { latin: "ex-sistere", info: "Wendung", german: "hervorkommen" },
      ];

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      let deck = [],
        repeatPool = [],
        knownSet = new Set(),
        pos = 0,
        flipped = false,
        round = 1;

      function init() {
        deck = shuffle(ALL_CARDS.map((_, i) => i));
        repeatPool = [];
        knownSet = new Set();
        pos = 0;
        flipped = false;
        round = 1;
        render();
      }

      function render() {
        const app = document.getElementById("app");

        if (knownSet.size === ALL_CARDS.length) {
          app.innerHTML = `
      <div class="done">
        <div class="done-emoji">🏛️</div>
        <h2>Alle gewusst!</h2>
        <p>Alle ${ALL_CARDS.length} Karten gemeistert.</p>
        <button class="btn-reset" onclick="init()">Neu starten</button>
      </div>`;
          return;
        }

        if (pos >= deck.length) {
          deck = shuffle(repeatPool);
          repeatPool = [];
          pos = 0;
          round++;
          flipped = false;
        }

        const card = ALL_CARDS[deck[pos]];
        const isWendung = card.info === "Wendung";
        const progress = Math.round((knownSet.size / ALL_CARDS.length) * 100);
        const totalLeft = deck.length - pos + repeatPool.length;

        app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>✓ ${knownSet.size} gewusst</span>
        <span>${totalLeft} verbleibend</span>
        <span>✗ ${repeatPool.length} wiederholen</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="round-badge">${round > 1 ? `Wiederholung · Runde ${round}` : "&nbsp;"}</div>

    <div class="scene" id="scene">
      <div class="card" id="card">
        <div class="card-face card-front">
          ${isWendung ? '<div class="tag">Wendung</div>' : ""}
          <div class="latin-word">${card.latin}</div>
          ${card.info && !isWendung ? `<div class="grammar-info">${card.info}</div>` : ""}
          <div class="tap-hint" id="tap-hint">Tippen zum Umdrehen</div>
        </div>
        <div class="card-face card-back">
          <div class="back-latin">${card.latin}</div>
          <div class="german-word">${card.german.replace(/\n/g, "<br>")}</div>
        </div>
      </div>
    </div>

    <div class="button-row">
      <button class="btn btn-nochmal" id="btn-n">✗ Nochmal</button>
      <button class="btn btn-gewusst" id="btn-g">✓ Gewusst</button>
    </div>

    <div class="counter" id="counter">Karte ${pos + 1} von ${deck.length}</div>
  `;

        document.getElementById("scene").addEventListener("click", flipCard);
        document.getElementById("btn-n").addEventListener("click", (e) => {
          e.stopPropagation();
          answer(false);
        });
        document.getElementById("btn-g").addEventListener("click", (e) => {
          e.stopPropagation();
          answer(true);
        });
      }

      function flipCard() {
        if (flipped) return;
        flipped = true;
        document.getElementById("card").classList.add("flipped");
        document.getElementById("btn-n").classList.add("visible");
        document.getElementById("btn-g").classList.add("visible");
        const hint = document.getElementById("tap-hint");
        if (hint) hint.style.opacity = "0";
      }

      function answer(correct) {
        if (correct) knownSet.add(deck[pos]);
        else repeatPool.push(deck[pos]);
        pos++;
        flipped = false;
        render();
      }

      init();
    </script>
  </body>
</html>
