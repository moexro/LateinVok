<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sallust, Catilina &#8211; 3. Schulaufgabe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #f8f7f5;
            --color-card: #ffffff;
            --color-accent: #a07070;
            --color-accent-light: #d4a5a5;
            --color-text: #333333;
            --color-text-light: #666666;
            --color-border: #e5ddd8;
            --color-success: #6b9966;
            --color-error: #a07070;
            --radius-card: 12px;
            --radius-btn: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-accent);
        }

        .subtitle {
            font-size: 14px;
            color: var(--color-text-light);
            margin-bottom: 16px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid var(--color-border);
            background: var(--color-card);
            color: var(--color-text);
            border-radius: var(--radius-btn);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--color-accent);
            background: var(--color-accent-light);
            color: white;
        }

        .filter-btn.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
            color: white;
        }

        .card-container {
            perspective: 600px;
            margin-bottom: 30px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            height: 280px;
            background: var(--color-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow);
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
            will-change: transform;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            border-radius: var(--radius-card);
        }

        .card-front {
            background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-light) 100%);
            color: white;
        }

        .card-back {
            background: var(--color-card);
            color: var(--color-text);
            border: 2px solid var(--color-border);
            transform: rotateY(180deg);
        }

        .card-term {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .card-meta {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 16px;
        }

        .card-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-back .card-badge {
            background: var(--color-accent-light);
            color: white;
        }

        .card-translation {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-extra {
            font-size: 12px;
            color: var(--color-text-light);
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--color-border);
            font-style: italic;
        }

        .card-front .card-extra {
            border-top-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
        }

        .flip-hint {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 16px;
        }

        .card-front .flip-hint {
            color: white;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--color-accent);
            color: white;
        }

        .btn-primary:hover {
            background: #8f5a5a;
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--color-card);
            color: var(--color-text);
            border: 2px solid var(--color-border);
        }

        .btn-secondary:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .stats {
            background: var(--color-card);
            padding: 20px;
            border-radius: var(--radius-card);
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--color-border);
        }

        .stats h3 {
            font-size: 14px;
            color: var(--color-text-light);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-bar {
            display: flex;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .stats-correct {
            background: var(--color-success);
            height: 100%;
            transition: width 0.3s ease;
        }

        .stats-text {
            font-size: 13px;
            color: var(--color-text-light);
        }

        .progress-info {
            font-size: 12px;
            color: var(--color-text-light);
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .card {
                height: 240px;
            }

            .card-term {
                font-size: 20px;
            }

            .card-translation {
                font-size: 16px;
            }

            .filter-buttons {
                margin-bottom: 20px;
            }

            .card-container {
                min-height: 260px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sallust, Catilina &#8211; 3. Schulaufgabe</h1>
            <p class="subtitle">LW 1, LW 3, LW 6, LW 9 &amp; LW 11 &middot; <span id="card-count">0</span> Karten</p>
        </header>

        <div class="filter-buttons">
            <button class="filter-btn active" onclick="setFilter('all', this)">Alle</button>
            <button class="filter-btn" onclick="setFilter('lw1', this)">Nur LW 1</button>
            <button class="filter-btn" onclick="setFilter('lw3', this)">Nur LW 3</button>
            <button class="filter-btn" onclick="setFilter('lw6', this)">Nur LW 6</button>
            <button class="filter-btn" onclick="setFilter('lw9', this)">Nur LW 9</button>
            <button class="filter-btn" onclick="setFilter('lw11', this)">Nur LW 11</button>
        </div>

        <div id="stats-container" class="hidden">
            <div class="stats">
                <h3>Fortschritt</h3>
                <div class="stats-bar">
                    <div class="stats-correct" id="stats-bar" style="width: 0%"></div>
                </div>
                <div class="stats-text"><span id="stats-correct">0</span> / <span id="stats-total">0</span> korrekt</div>
            </div>
        </div>

        <div class="card-container" onclick="flipCard()">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <div id="card-content-front"></div>
                </div>
                <div class="card-face card-back">
                    <div id="card-content-back"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="markCorrect()">&#10003; Gewusst</button>
            <button class="btn-secondary" onclick="markIncorrect()">✗ Nicht gewusst</button>
        </div>

        <div class="progress-info">
            <p>Karte <span id="current-card">0</span> von <span id="total-cards">0</span></p>
        </div>
    </div>

    <script>
        var allCards = [
            // LW 1
            { term: "pax, pacis", meta: "f", translation: "der Frieden", lw: "lw1" },
            { term: "tamet\u0161\u012b", meta: "Konj.", translation: "obwohl", lw: "lw1" },
            { term: "gloria", meta: "f", translation: "der Ruhm, die Ehre", lw: "lw1" },
            { term: "magister", meta: "m", translation: "der Lehrer", lw: "lw1" },
            { term: "invid\u012ba", meta: "f", translation: "der Neid", lw: "lw1" },
            { term: "aequus, a, um", meta: "Adj.", translation: "gleich, gerecht", lw: "lw1" },
            { term: "adversus, a, um", meta: "Adj.", translation: "entgegengesetzt, freundlich", lw: "lw1" },
            { term: "audacia", meta: "f", translation: "die Frechheit, die K\u00fchnheit", lw: "lw1" },
            { term: "av\u0101ritia", meta: "f", translation: "die Habgier, der Geiz", lw: "lw1" },
            { term: "arduus, a, um", meta: "Adj.", translation: "schwer, steil", lw: "lw1" },
            { term: "dehinc", meta: "Adv.", translation: "hierauf", lw: "lw1" },
            { term: "abstin\u0113ntia", meta: "f", translation: "die Uneignn\u00fctzigkeit; die Enthaltsamkeit", lw: "lw1" },
            { term: "vig\u0113re", meta: "V.", translation: "(vor)herrschen; stark sein", lw: "lw1" },
            { term: "imbecillus, a, um", meta: "Adj.", translation: "schwach, anf\u00e4llig", lw: "lw1" },
            { term: "ambitio, \u014dnis", meta: "f", translation: "der Ehrgeiz", lw: "lw1" },
            { term: "cupid\u014d, inis", meta: "f", translation: "die Begierde; die Gier", lw: "lw1" },
            { term: "vex\u0101re", meta: "V.", translation: "qu\u00e4len, heimsuchen", lw: "lw1" },

            // LW 3
            { term: "ingenium", meta: "n", translation: "die Begabung, das Talent", lw: "lw3" },
            { term: "caedis, is", meta: "f", translation: "das Blutbad, der Mord", lw: "lw3" },
            { term: "gr\u0101tus, a, um", meta: "Adj.", translation: "kostenlos, willkommen, beliebt", lw: "lw3" },
            { term: "vastus, a, um", meta: "Adj.", translation: "riesig, vernichtet", lw: "lw3" },
            { term: "nimis", meta: "Adv.", translation: "(allzu) sehr", lw: "lw3" },
            { term: "altus, a, um", meta: "Adj.", translation: "hoch, tief", lw: "lw3" },
            { term: "inopia", meta: "f", translation: "der Mangel, die Not", lw: "lw3" },
            { term: "adulescentia", meta: "f", translation: "die Jugend(zeit)", lw: "lw3" },
            { term: "discordia", meta: "f", translation: "die Uneinigkeit, die Spaltung", lw: "lw3" },
            { term: "civilis, e", meta: "Adj.", translation: "b\u00fcrgerlich", lw: "lw3" },
            { term: "patiens, ntis", meta: "Adj.", translation: "f\u00e4hig, (etw.) zu ertragen", lw: "lw3" },
            { term: "eloquentia", meta: "f", translation: "die Redekunst", lw: "lw3" },
            { term: "sapientia", meta: "f", translation: "die Klugheit, die Weisheit", lw: "lw3" },
            { term: "dominatio, \u014dnis", meta: "f", translation: "die Gewaltherrschaft", lw: "lw3" },
            { term: "inv\u0101dere", meta: "V.", translation: "eindringen, angreifen", lw: "lw3" },
            { term: "in dies", meta: "Adv.", translation: "von Tag zu Tag", lw: "lw3" },
            { term: "ferox, \u014dcis", meta: "Adj.", translation: "wild, ungest\u00fcm", lw: "lw3" },
            { term: "r\u0113s famili\u0101ris", meta: "f", translation: "das Verm\u00f6gen", lw: "lw3" },
            { term: "conscientia", meta: "f", translation: "das (Schuld-)Bewusstsein", lw: "lw3" },
            { term: "incit\u0101re", meta: "V.", translation: "antreiben, aufeuern", lw: "lw3" },
            { term: "luxuria", meta: "f", translation: "die Genusssucht, der \u00dcberfluss", lw: "lw3" },

            // LW 6
            { term: "institutum", meta: "n", translation: "die Einrichtung, die Sitte", lw: "lw6" },
            { term: "diss\u0113rere", meta: "V.", translation: "eror\u0308tern; auseinandersetzen", lw: "lw6" },
            { term: "i\u016bstitia", meta: "f", translation: "die Gerechtigkeit", lw: "lw6" },
            { term: "dom\u0101re", meta: "V.", translation: "z\u00e4hmen, bezwingen", lw: "lw6" },
            { term: "subig\u0119re", meta: "V.", translation: "unterwerfen, zwingen", lw: "lw6" },
            { term: "inter\u012bre", meta: "V.", translation: "untergehen", lw: "lw6" },
            { term: "s\u0101evire", meta: "V.", translation: "w\u00fcten, toben", lw: "lw6" },
            { term: "dubius, a, um", meta: "Adj.", translation: "riskant, auf der Kippe stehend", lw: "lw6" },
            { term: "divitiae, \u0101rum", meta: "f Pl.", translation: "der Reichtum", lw: "lw6" },
            { term: "interdum", meta: "Adv.", translation: "manchmal", lw: "lw6" },
            { term: "corrimp\u0119re", meta: "V.", translation: "bestechen, verderben", lw: "lw6" },
            { term: "i\u016bdicium", meta: "n", translation: "das Gericht, das Urteil", lw: "lw6" },
            { term: "facinus, \u014dnis", meta: "n", translation: "die Handlung, die Untat", lw: "lw6" },
            { term: "bonum", meta: "n", translation: "das Gut, die G\u00fcte", lw: "lw6" },
            { term: "aes alienum", meta: "n", translation: "die Schulden", lw: "lw6" },
            { term: "adulter, adulteri", meta: "m", translation: "der Ehbrecher", lw: "lw6" },
            { term: "venter, ventris", meta: "m", translation: "der Bauch", lw: "lw6" },
            { term: "p\u0113nis, is", meta: "m", translation: "der Penis", lw: "lw6" },
            { term: "redim\u0119re", meta: "V.", translation: "freikaufen, loskaufen (von etw.)", lw: "lw6" },
            { term: "convinc\u0119re", meta: "V.", translation: "(gerichtlich) \u00fcberf\u00fchren", lw: "lw6" },
            { term: "egest\u0101s, atis", meta: "f", translation: "die Armut, die Not", lw: "lw6" },
            { term: "vacuus, a, um", meta: "Adj.", translation: "leer, frei", lw: "lw6" },
            { term: "incid\u0119re", meta: "V.", translation: "in etw. geraten; vorfallen, sich zutragen", lw: "lw6" },
            { term: "c\u014dtidianus, a, um", meta: "Adj.", translation: "t\u00e4glich", lw: "lw6" },
            { term: "familiaris, is", meta: "f", translation: "die Freundschaft", lw: "lw6" },
            { term: "modestia", meta: "f", translation: "die M\u00e4\u00dfigung, die Bescheidenheit", lw: "lw6" },
            { term: "fidus, a, um", meta: "Adj.", translation: "treu, zuw\u00e4hlissig", lw: "lw6" },
            { term: "pudicitia", meta: "f", translation: "die Sitsamkeit, die Keuschheit", lw: "lw6" },

            // LW 9
            { term: "opt\u0101re", meta: "V.", translation: "w\u00fcnschen", lw: "lw9" },
            { term: "praeterē\u0101", meta: "Adv.", translation: "au\u00dferdem", lw: "lw9" },
            { term: "praemium", meta: "n", translation: "die Belohnung, der Lohn", lw: "lw9" },
            { term: "fall\u0119re", meta: "V.", translation: "t\u00e4uschen, betr\u00fcgen", lw: "lw9" },
            { term: "decus, oris", meta: "n", translation: "die Ehre; die (\u00e4u\u00dfere) W\u00fcrde", lw: "lw9" },
            { term: "d\u0113decus", meta: "n", translation: "die Schande", lw: "lw9" },
            { term: "spolium", meta: "n", translation: "die Beute", lw: "lw9" },
            { term: "spoliare", meta: "V.", translation: "aus\u00fcnden, beunte machen", lw: "lw9" },
            { term: "m\u0101gnificus, a, um", meta: "Adj.", translation: "pr\u00e4chtig, gro\u00dfartig", lw: "lw9" },

            // LW 11
            { term: "civit\u0101s, atis", meta: "f", translation: "die Gemeinde, der Staat; das B\u00fcrgerrecht", lw: "lw11" },
            { term: "inc\u0113dere", meta: "V.", translation: "heranr\u00fccken, eintreten; (jdn.) befallen", lw: "lw11" },
            { term: "laetitia", meta: "f", translation: "die Freude", lw: "lw11" },
            { term: "supplex, supplicis", meta: "Adj.", translation: "dem\u00fctig bittend", lw: "lw11" },
            { term: "repente", meta: "Adv.", translation: "pl\u00f6tzlich, unerwartet", lw: "lw11" },
            { term: "cr\u0113dere", meta: "V.", translation: "anvertrauen, glauben", lw: "lw11" },
            { term: "faci\u0113s, ei", meta: "f", translation: "das Gesicht, das Aussehen", lw: "lw11" },
            { term: "lascivia", meta: "f", translation: "die Ausgelassenheit", lw: "lw11" },
            { term: "festin\u0101re", meta: "V.", translation: "umhereilen, ruhelos sein", lw: "lw11" },
            { term: "trepid\u0101re", meta: "V.", translation: "\u00e4ngstlich sein", lw: "lw11" },
            { term: "\u012bns\u014dlitus, a, um", meta: "Adj.", translation: "ungew\u00f6hnlich", lw: "lw11" },
            { term: "r\u016bmor, \u014dris", meta: "m", translation: "das Ger\u00fccht", lw: "lw11" },
            { term: "pav\u0113re", meta: "V.", translation: "sich \u00e4ngstigen \u00fcber", lw: "lw11" }
        ];

        var currentIndex = 0;
        var filteredCards = [];
        var currentFilter = 'all';
        var learned = {};
        var sessionStats = {};

        function updateCardCount() {
            document.getElementById('card-count').textContent = filteredCards.length;
            document.getElementById('total-cards').textContent = filteredCards.length;
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            currentIndex = 0;
            learned = {};
            sessionStats = {};

            if (filter === 'all') {
                filteredCards = allCards.slice();
            } else {
                filteredCards = allCards.filter(function(card) {
                    return card.lw === filter;
                });
            }

            updateCardCount();
            renderCard();

            var buttons = document.querySelectorAll('.filter-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btn.classList.add('active');

            document.getElementById('stats-container').classList.add('hidden');
        }

        function renderCard() {
            if (filteredCards.length === 0) {
                document.getElementById('card-content-front').innerHTML = '<p>Keine Karten</p>';
                return;
            }

            var card = filteredCards[currentIndex];
            var cardEl = document.getElementById('card');

            cardEl.classList.remove('flipped');

            var frontContent = '<div class="card-term">' + card.term + '</div>';
            if (card.meta) {
                frontContent += '<div class="card-meta">' + card.meta + '</div>';
            }
            if (card.lw) {
                frontContent += '<div class="card-badge">' + card.lw.toUpperCase() + '</div>';
            }
            frontContent += '<div class="flip-hint">zum Umdrehen klicken</div>';

            document.getElementById('card-content-front').innerHTML = frontContent;
            document.getElementById('card-content-back').innerHTML = ''; // Wird erst beim Flip gefüllt

            document.getElementById('current-card').textContent = currentIndex + 1;

            updateStats();
        }

        function flipCard() {
            var cardEl = document.getElementById('card');
            if (!cardEl.classList.contains('flipped')) {
                // Rückseite füllen BEVOR umgedreht wird (wie in T-2)
                fillCardBack();
            }
            cardEl.classList.toggle('flipped');
        }

        function fillCardBack() {
            if (filteredCards.length === 0) return;
            var card = filteredCards[currentIndex];

            var backContent = '<div class="card-translation">' + card.translation + '</div>';
            if (card.extra) {
                backContent += '<div class="card-extra">' + card.extra + '</div>';
            }
            if (card.lw) {
                backContent += '<div class="card-badge">' + card.lw.toUpperCase() + '</div>';
            }

            document.getElementById('card-content-back').innerHTML = backContent;
        }

        function markCorrect() {
            if (filteredCards.length === 0) return;
            learned[currentIndex] = true;
            sessionStats[currentIndex] = 'correct';
            nextCard();
        }

        function markIncorrect() {
            if (filteredCards.length === 0) return;
            sessionStats[currentIndex] = 'incorrect';
            nextCard();
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex >= filteredCards.length) {
                showEndScreen();
            } else {
                renderCard();
            }
        }

        function updateStats() {
            var correct = 0;
            for (var i = 0; i < currentIndex; i++) {
                if (sessionStats[i] === 'correct') correct++;
            }

            var percentage = currentIndex > 0 ? Math.round((correct / currentIndex) * 100) : 0;

            document.getElementById('stats-bar').style.width = percentage + '%';
            document.getElementById('stats-correct').textContent = correct;
            document.getElementById('stats-total').textContent = currentIndex;

            if (currentIndex > 0) {
                document.getElementById('stats-container').classList.remove('hidden');
            }
        }

        function showEndScreen() {
            var correct = 0;
            for (var key in sessionStats) {
                if (sessionStats[key] === 'correct') correct++;
            }

            var total = currentIndex;
            var percentage = total > 0 ? Math.round((correct / total) * 100) : 0;

            var message = 'Schulaufgabe abgeschlossen!<br>' +
                          '<strong>' + correct + ' von ' + total + ' korrekt (' + percentage + '%)</strong>';

            if (percentage === 100) {
                message += '<br><em>Perfekt!</em>';
            } else if (percentage >= 80) {
                message += '<br><em>Sehr gut!</em>';
            } else if (percentage >= 60) {
                message += '<br><em>Ganz Ordentlich!</em>';
            }

            document.getElementById('card-content-front').innerHTML = 
                '<div style="text-align: center; font-size: 20px; color: white;">' + message + '</div>';
            document.getElementById('card-content-back').innerHTML =
                '<button class="btn-primary" onclick="location.reload()" style="width: 100%; padding: 14px;">Neu starten</button>';

            var cardEl = document.getElementById('card');
            cardEl.classList.remove('flipped');
            document.getElementById('current-card').textContent = total;
        }

        // Initialisieren
        setFilter('all', document.querySelector('.filter-btn.active'));
    </script>
</body>
</html>
