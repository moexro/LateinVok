<!doctype html>

<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ovid – LW 6</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header>
      <div class="subtitle">Latein · Ovid</div>
      <h1>LW 6</h1>
    </header>

    <div id="app"></div>

    <script>
      const ALL_CARDS = [
        { latin: "cāsus", info: "ūs m", german: "der Fall, der Zufall" },
        { latin: "cārus", info: "a, um", german: "lieb, teuer, wertvoll" },
        {
          latin: "perdere",
          info: "perdō, perdidī, perditum",
          german: "verlieren, verschwenden,\nzugrunde richten",
        },
        { latin: "fortis", info: "e", german: "kräftig, tapfer" },
        {
          latin: "exstinguere",
          info: "exstinguō, exstīnxī, exstīnctum",
          german: "auslöschen, vernichten",
        },
        {
          latin: "comes",
          info: "itis m",
          german: "der Begleiter, der Gefährte",
        },
        { latin: "ambō", info: "ambae, ambō", german: "beide (zusammen)" },
        {
          latin: "tegere",
          info: "tegō, tēxī, tēctum",
          german: "bedecken, schützen, verbergen",
        },
        {
          latin: "ērigere",
          info: "ērigō, ērēxī, ērēctum",
          german: "aufrichten, emporheben",
        },
        { latin: "lētum", info: "", german: "der Tod" },
        { latin: "tumulus", info: "", german: "der (Grab-)Hügel" },
        { latin: "rāmus", info: "", german: "der Ast" },
        { latin: "aptus", info: "a, um", german: "passend, geeignet" },
        { latin: "geminus", info: "a, um", german: "doppelt" },
        { latin: "cruor", info: "ōris m", german: "das Blut" },
      ];

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      let deck = [],
        repeatPool = [],
        knownSet = new Set(),
        pos = 0,
        flipped = false,
        round = 1;

      function init() {
        deck = shuffle(ALL_CARDS.map((_, i) => i));
        repeatPool = [];
        knownSet = new Set();
        pos = 0;
        flipped = false;
        round = 1;
        render();
      }

      function render() {
        const app = document.getElementById("app");

        if (knownSet.size === ALL_CARDS.length) {
          app.innerHTML = `
      <div class="done">
        <div class="done-emoji">🏛️</div>
        <h2>Alle gewusst!</h2>
        <p>Alle ${ALL_CARDS.length} Karten gemeistert.</p>
        <button class="btn-reset" onclick="init()">Neu starten</button>
      </div>`;
          return;
        }

        if (pos >= deck.length) {
          deck = shuffle(repeatPool);
          repeatPool = [];
          pos = 0;
          round++;
          flipped = false;
        }

        const card = ALL_CARDS[deck[pos]];
        const progress = Math.round((knownSet.size / ALL_CARDS.length) * 100);
        const totalLeft = deck.length - pos + repeatPool.length;

        app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>✓ ${knownSet.size} gewusst</span>
        <span>${totalLeft} verbleibend</span>
        <span>✗ ${repeatPool.length} wiederholen</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="round-badge">${round > 1 ? `Wiederholung · Runde ${round}` : "&nbsp;"}</div>

    <div class="scene" id="scene">
      <div class="card" id="card">
        <div class="card-face card-front">
          <div class="latin-word">${card.latin}</div>
          ${card.info ? `<div class="grammar-info">${card.info}</div>` : ""}
          <div class="tap-hint" id="tap-hint">Tippen zum Umdrehen</div>
        </div>
        <div class="card-face card-back">
          <div class="back-latin">${card.latin}</div>
          <div class="german-word">${card.german.replace(/\n/g, "<br>")}</div>
        </div>
      </div>
    </div>

    <div class="button-row">
      <button class="btn btn-nochmal" id="btn-n">✗ Nochmal</button>
      <button class="btn btn-gewusst" id="btn-g">✓ Gewusst</button>
    </div>

    <div class="counter" id="counter">Karte ${pos + 1} von ${deck.length}</div>
  `;

        document.getElementById("scene").addEventListener("click", flipCard);
        document.getElementById("btn-n").addEventListener("click", (e) => {
          e.stopPropagation();
          answer(false);
        });
        document.getElementById("btn-g").addEventListener("click", (e) => {
          e.stopPropagation();
          answer(true);
        });
      }

      function flipCard() {
        if (flipped) return;
        flipped = true;
        document.getElementById("card").classList.add("flipped");
        document.getElementById("btn-n").classList.add("visible");
        document.getElementById("btn-g").classList.add("visible");
        const hint = document.getElementById("tap-hint");
        if (hint) hint.style.opacity = "0";
      }

      function answer(correct) {
        if (correct) knownSet.add(deck[pos]);
        else repeatPool.push(deck[pos]);
        pos++;
        flipped = false;
        render();
      }

      init();
    </script>
  </body>
</html>
