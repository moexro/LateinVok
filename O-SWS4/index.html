<!doctype html>

<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Ovid – Spezialwortschatz IV</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header>
      <div class="subtitle">Latein · Ovid</div>
      <h1>Spezialwortschatz IV</h1>
    </header>

    <div id="app"></div>

    <script>
      const ALL_CARDS = [
        {
          latin: "gignere",
          info: "gignō, genuī, genitum",
          german: "erzeugen, gebären",
        },
        { latin: "hērēs", info: "hērēdis m", german: "Erbe" },
        { latin: "heu", info: "", german: "ach" },
        { latin: "immēnsus", info: "a, um", german: "unendlich, unermesslich" },
        { latin: "imminēre", info: "immineō", german: "drohen" },
        { latin: "immōtus", info: "a, um", german: "unbewegt" },
        {
          latin: "incumbere",
          info: "incubō, incubuī m. Dat.",
          german: "sich stürzen auf/in",
        },
        { latin: "inhibēre", info: "inhibeō", german: "hindern" },
        { latin: "interdum", info: "Adv.", german: "manchmal" },
        { latin: "laniāre", info: "laniō", german: "zerfleischen, zerreißen" },
        { latin: "levāre", info: "levō", german: "erleichtern" },
        { latin: "licet", info: "Subj.", german: "wenn auch" },
        { latin: "līmes", info: "līmitis m", german: "Bahn, Weg" },
        { latin: "lūna", info: "", german: "Mond" },
        { latin: "māteria", info: "", german: "Nahrung, Stoff" },
        { latin: "merēre", info: "mereō", german: "verdienen" },
        { latin: "mītis", info: "e", german: "mild" },
        { latin: "mōlēs", info: "mōlis f", german: "1 Mole\n2 Gewalt" },
        { latin: "murmur", info: "murmuris n", german: "Flüstern, Murmeln" },
        { latin: "nāta", info: "", german: "Tochter" },
        { latin: "nefās", info: "n indekl.", german: "Unrecht (gegen Götter)" },
        { latin: "nēquīquam", info: "Adv.", german: "vergeblich" },
        { latin: "niger", info: "nigra, nigrum", german: "schwarz" },
        { latin: "nitidus", info: "a, um", german: "glänzend" },
        { latin: "novem", info: "", german: "neun" },
        { latin: "aether", info: "", german: "Himmelsraum" },
        { latin: "astrum", info: "", german: "Stern" },
        { latin: "stella", info: "", german: "Stern" },
        { latin: "sol", info: "", german: "Sonne" },
        { latin: "nubes", info: "", german: "Wolke" },
        { latin: "aër", info: "", german: "Luft" },
        { latin: "aura", info: "", german: "Gunst, Luft" },
        { latin: "spatium", info: "", german: "Raum, Strecke, Zeitraum" },
        { latin: "polus", info: "", german: "Pol" },
        { latin: "tellus", info: "", german: "Erde" },
        { latin: "ignarus", info: "", german: "ohne Kenntnis, unwissend" },
        { latin: "infelix", info: "", german: "unglücklich" },
        { latin: "quamquam", info: "Konj.", german: "obwohl; freilich" },
        {
          latin: "cum",
          info: "Konj.",
          german: "als; nachdem; weil;\nobwohl; während",
        },
      ];

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      let deck = [],
        repeatPool = [],
        knownSet = new Set(),
        pos = 0,
        flipped = false,
        round = 1;

      function init() {
        deck = shuffle(ALL_CARDS.map((_, i) => i));
        repeatPool = [];
        knownSet = new Set();
        pos = 0;
        flipped = false;
        round = 1;
        render();
      }

      function render() {
        const app = document.getElementById("app");

        if (knownSet.size === ALL_CARDS.length) {
          app.innerHTML = `
      <div class="done">
        <div class="done-emoji">🏛️</div>
        <h2>Alle gewusst!</h2>
        <p>Alle ${ALL_CARDS.length} Karten gemeistert.</p>
        <button class="btn-reset" onclick="init()">Neu starten</button>
      </div>`;
          return;
        }

        if (pos >= deck.length) {
          deck = shuffle(repeatPool);
          repeatPool = [];
          pos = 0;
          round++;
          flipped = false;
        }

        const card = ALL_CARDS[deck[pos]];
        const isWendung = card.info === "Wendung";
        const progress = Math.round((knownSet.size / ALL_CARDS.length) * 100);
        const totalLeft = deck.length - pos + repeatPool.length;

        app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-labels">
        <span>✓ ${knownSet.size} gewusst</span>
        <span>${totalLeft} verbleibend</span>
        <span>✗ ${repeatPool.length} wiederholen</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="round-badge">${round > 1 ? `Wiederholung · Runde ${round}` : "&nbsp;"}</div>

    <div class="scene" id="scene">
      <div class="card" id="card">
        <div class="card-face card-front">
          ${isWendung ? '<div class="tag">Wendung</div>' : ""}
          <div class="latin-word">${card.latin}</div>
          ${card.info && !isWendung ? `<div class="grammar-info">${card.info}</div>` : ""}
          <div class="tap-hint" id="tap-hint">Tippen zum Umdrehen</div>
        </div>
        <div class="card-face card-back">
          <div class="back-latin">${card.latin}</div>
          <div class="german-word">${card.german.replace(/\n/g, "<br>")}</div>
        </div>
      </div>
    </div>

    <div class="button-row">
      <button class="btn btn-nochmal" id="btn-n">✗ Nochmal</button>
      <button class="btn btn-gewusst" id="btn-g">✓ Gewusst</button>
    </div>

    <div class="counter" id="counter">Karte ${pos + 1} von ${deck.length}</div>
  `;

        document.getElementById("scene").addEventListener("click", flipCard);
        document.getElementById("btn-n").addEventListener("click", (e) => {
          e.stopPropagation();
          answer(false);
        });
        document.getElementById("btn-g").addEventListener("click", (e) => {
          e.stopPropagation();
          answer(true);
        });
      }

      function flipCard() {
        if (flipped) return;
        flipped = true;
        document.getElementById("card").classList.add("flipped");
        document.getElementById("btn-n").classList.add("visible");
        document.getElementById("btn-g").classList.add("visible");
        const hint = document.getElementById("tap-hint");
        if (hint) hint.style.opacity = "0";
      }

      function answer(correct) {
        if (correct) knownSet.add(deck[pos]);
        else repeatPool.push(deck[pos]);
        pos++;
        flipped = false;
        render();
      }

      init();
    </script>
  </body>
</html>
